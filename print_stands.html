<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>一方院・陳宅導覽｜牆貼印製稿（A5・一站一張）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --brick:#BA4B2F; --green:#26573C; --paper:#F7F3EC; --ink:#160604; --line:#d9cfbe;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Noto Sans TC",sans-serif;background:#cfc7b8;padding:24px}
  .serif{font-family:"Noto Serif TC",serif}

  /* 螢幕上每頁間距；列印時 A5 一頁一張 */
  .board{
    width:148mm;height:210mm;margin:0 auto 24px;background:var(--paper);
    color:var(--ink);position:relative;overflow:hidden;
    box-shadow:0 6px 24px rgba(0,0,0,.18);
    padding:18mm 16mm;display:flex;flex-direction:column;
  }
  .board::before{
    content:"";position:absolute;inset:8mm;border:1px solid var(--line);border-radius:3mm;pointer-events:none;
  }

  .topbar{display:flex;align-items:baseline;justify-content:space-between;z-index:1}
  .brand{font-family:"Noto Serif TC",serif;font-weight:700;color:var(--brick);font-size:22pt;letter-spacing:.16em}
  .brand small{display:block;font-family:"Noto Sans TC";font-weight:400;color:var(--green);
    font-size:7pt;letter-spacing:.3em;margin-top:2pt}
  .badge{font-size:8pt;color:var(--green);letter-spacing:.12em;text-align:right;line-height:1.5}

  .no{font-family:"Noto Serif TC",serif;color:var(--brick);font-size:13pt;letter-spacing:.24em;margin-top:13mm;z-index:1}
  .title{font-family:"Noto Serif TC",serif;font-weight:900;font-size:30pt;line-height:1.3;margin-top:3mm;z-index:1}
  .en{color:var(--green);font-size:8.5pt;letter-spacing:.28em;text-transform:uppercase;margin-top:4mm;z-index:1}

  .hook{
    border-left:4px solid var(--brick);padding:5mm 6mm;margin-top:9mm;
    font-size:14.5pt;line-height:1.95;color:#43382f;z-index:1;
  }

  .spacer{flex:1}

  .scan{display:flex;align-items:flex-end;justify-content:space-between;z-index:1}
  .scan .cta{font-size:11.5pt;color:var(--green);line-height:1.7}
  .scan .cta b{display:block;font-family:"Noto Serif TC",serif;color:var(--brick);font-size:17pt;margin-bottom:2.5mm}
  .scan .qr{width:46mm;height:46mm;border:1px solid var(--line);background:#fff;padding:2mm;border-radius:2mm;flex:0 0 auto}
  .scan .qr img{width:100%;height:100%;display:block;image-rendering:pixelated}

  .foot{text-align:center;color:#9c8e7d;font-size:7.5pt;margin-top:6mm;letter-spacing:.05em;z-index:1}

  /* 入口大牌 */
  .board.entry{justify-content:center;text-align:center}
  .board.entry .logo{width:46mm;height:auto;margin:0 auto}
  .board.entry .brand-en{color:var(--green);font-size:9pt;letter-spacing:.4em;margin-top:5mm}
  .board.entry .lead{font-size:13pt;line-height:2.1;color:#43382f;margin:11mm 4mm 0;word-break:keep-all;line-break:strict}
  .board.entry .lead .gap{display:block;height:3mm}
  .board.entry .qr{width:50mm;height:50mm;margin:11mm auto 0;border:1px solid var(--line);background:#fff;padding:2mm;border-radius:2mm}
  .board.entry .qr img{width:100%;height:100%;image-rendering:pixelated}
  .board.entry .qcap{font-size:11pt;color:var(--green);margin-top:4mm}

  .note{max-width:148mm;margin:0 auto 18px;color:#5a5347;font-size:13px;line-height:1.7}
  @media print{
    body{background:#fff;padding:0}
    .note{display:none}
    .board{margin:0;box-shadow:none;page-break-after:always}
    @page{size:A5 portrait;margin:0}
  }
</style>
</head>
<body>
<div class="note">
  💡 列印：Cmd/Ctrl + P → 紙張選 <b>A5</b>、邊界<b>無</b>、勾選「背景圖形」。或先存成 PDF 再拿去輸出店。<br>
  一頁一張，順序為：入口大牌 → 第 1～4 站。QR 已指向正式網址 https://dmct1013.github.io/yifang-stay/
</div>
<div id="boards"></div>

<script>
// 牆貼上的短引言（網站本身已不放精華框，這裡單獨給實體牌一句鉤子）
const HOOKS = {
  1: "站在百年三合院的中心，聽郭新林的彩繪，說一百年來沒說完的話。",
  2: "這排廂房曾經整個倒下，只剩一道牆——聽它如何一塊一塊重新站起來。",
  3: "蹲下來，看看腳邊的洗石子、花磚與石獅，藏著陳家當年多少講究。",
  4: "一個渡海來台的家族，一座燒過又重生的村子——這座大厝背後的故事。"
};

fetch('stops.json',{cache:'no-store'}).then(r=>r.json()).then(data=>{
  const root = document.getElementById('boards');

  // 入口大牌
  const e = document.createElement('div');
  e.className='board entry';
  e.innerHTML = `
    <img class="logo" src="logo.svg" alt="一方院・旅宿 YI FANG STAY">
    <div class="brand-en">YI FANG STAY</div>
    <div class="lead">古坑東和陳宅<br>一座民國七年（1918）的百年三合院<span class="gap"></span>掃描這張 QR，看完整導覽地圖<br>聽老厝，慢慢說自己的故事</div>
    <div class="qr"><img src="qr/home.png" alt="home QR"></div>
    <div class="qcap serif">掃我 · 看完整導覽地圖</div>`;
  root.appendChild(e);

  // 各站
  data.stops.forEach(s=>{
    const b = document.createElement('div');
    b.className='board';
    b.innerHTML = `
      <div class="topbar">
        <div class="brand serif">一方院<small>YI FANG STAY</small></div>
        <div class="badge">雲林縣歷史建築<br>民國七年・1918</div>
      </div>
      <div class="no serif">第 ${s.id} 站　／　共 ${data.stops.length} 站</div>
      <div class="title serif">${s.title}</div>
      <div class="en">${s.en}</div>
      <div class="hook">${HOOKS[s.id] || ''}</div>
      <div class="spacer"></div>
      <div class="scan">
        <div class="cta"><b class="serif">掃我聽故事 🎧</b>國語語音導覽<br>老照片 · 完整歷史</div>
        <div class="qr"><img src="qr/stop${s.id}.png" alt="QR ${s.id}"></div>
      </div>
      <div class="foot">古坑鄉東和村文化路 115-1 號　｜　一方院・旅宿</div>`;
    root.appendChild(b);
  });
});
</script>
</body>
</html>
